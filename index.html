<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scoreboard</title>

<style>
body {
    margin: 0;
    background: #1a1a1a;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* BOARD */
.board {
    width: 420px;
    height: 420px;
    border-radius: 50%;
    border: 6px solid #555;
    position: relative;
    background: #111;
}

/* FONTS */
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap');

.label {
    font-family: 'Orbitron', sans-serif;
    font-size: 12px;
    color: #aaa;
    letter-spacing: 2px;
}

/* HOME */
.topScore {
    position: absolute;
    top: 60px;
    width: 100%;
    text-align: center;
}

/* GUEST */
.bottomScore {
    position: absolute;
    bottom: 140px;
    width: 100%;
    text-align: center;
}

/* SCORES */
.scoreNum {
    font-family: 'scoreboard';
    font-size: 80px;
    color: red;
}

/* TIMER */
.timer {
    position: absolute;
    bottom: 40px;
    width: 100%;
    text-align: center;
    font-family: 'scoreboard';
    font-size: 50px;
    color: orange;
}
</style>
</head>

<body>

<div class="board" id="board">

    <div class="topScore">
        <div class="label">HOME</div>
        <div class="scoreNum" id="homeScore">0</div>
    </div>

    <div class="bottomScore">
        <div class="label">GUEST</div>
        <div class="scoreNum" id="awayScore">0</div>
    </div>

    <div class="timer" id="timer">6:00</div>

</div>

</body>
</html>
