<style>
body {
  margin: 0;
  background: #0b2f7a; /* dark blue background */
  font-family: Arial, sans-serif;
  color: white;
}

.scoreboard {
  display: grid;
  grid-template-columns: 1fr 2fr 1fr;
  grid-template-rows: auto auto auto;
  height: 100vh;
  text-align: center;
  align-items: center;
}

.team {
  font-size: 60px;
  font-weight: bold;
  letter-spacing: 2px; /* more blocky letters */
}

.score {
  font-size: 140px;
  color: #66ccff; /* light blue */
  font-family: "Courier New", monospace;
  letter-spacing: 0; /* remove wide spacing for squared look */
  border: 4px solid #66ccff; /* gives a squared/box style */
  border-radius: 8px; /* slight rounding but still blocky */
  padding: 10px 20px;
  display: inline-block;
}

.timer {
  font-size: 120px;
  color: #66ccff; /* light blue for consistency */
  font-family: "Courier New", monospace;
  border: 4px solid #66ccff;
  border-radius: 8px;
  padding: 10px 20px;
  display: inline-block;
}

.period {
  font-size: 60px;
  color: #66ccff;
}

.bonus {
  font-size: 30px;
  color: white;
}

.center {
  grid-column: 2;
}

.left {
  grid-column: 1;
}

.right {
  grid-column: 3;
}
</style>
