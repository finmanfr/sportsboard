<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scoreboard</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background: #000000;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* BOARD */
.board {
    width: 420px;
    height: 420px;
    border-radius: 50%;
    border: 6px solid #555;
    background: #111;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

/* FONT */
@font-face {
    font-family: 'scoreboard';
    src: url('scoreboard.ttf');
}

/* LABELS */
.label {
    font-family: 'Orbitron', sans-serif;
    font-size: 12px;
    color: #aaa;
    letter-spacing: 2px;
    margin-top: 10px;
}

/* SCORES */
.score {
    text-align: center;
}

.scoreNum {
    font-family: 'scoreboard';
    font-size: 70px;
    color: red;
}

/* DIVIDER */
.divider {
    width: 60%;
    height: 2px;
    background: #555;
    margin: 10px 0;
}

/* PERIOD */
#period {
    font-family: 'scoreboard';
    font-size: 28px;
    color: red;
}

/* TIMER */
.timer {
    font-family: 'scoreboard';
    font-size: 50px;
    color: orange;
}

/* FLASH */
.flash {
    animation: flash 0.5s infinite;
}

@keyframes flash {
    0% { opacity: 1; }
    50% { opacity: 0.2; }
    100% { opacity: 1; }
}

/* POPUP */
.popup {
    position: absolute;
    font-family: 'scoreboard';
    color: lime;
    font-size: 20px;
    animation: pop 1s forwards;
}

@keyframes pop {
    0% { transform: scale(1); opacity: 1; }
    100% { transform: scale(2.5); opacity: 0; }
}
</style>
</head>

<body>
<iframe 
  id="cameraFeed"
  src="https://vdo.ninja/?view=JxeTTTK" 
  style="
    width: 100%;
    height: 100vh;
    border: none;
    position: fixed;
    top: 0;
    left: 0;
    z-index: 0;
    display: none;
  ">
</iframe>
<div class="board" id="board">

    <!-- HOME -->
    <div class="score">
        <div class="label">HOME</div>
        <div class="scoreNum" id="homeScore">0</div>
    </div>

    <!-- GUEST -->
    <div class="score">
        <div class="label">GUEST</div>
        <div class="scoreNum" id="awayScore">0</div>
    </div>

    <!-- LINE -->
    <div class="divider"></div>

    <!-- PERIOD -->
    <div class="label">PERIOD</div>
    <div id="period">1</div>

    <!-- TIME -->
    <div class="timer" id="timer">6:00</div>

</div>

<!-- AUDIO -->
<audio id="threeSound" src="three.mp3"></audio>
<audio id="crowdSound" src="crowd.mp3"></audio>
<audio id="buzzerSound" src="buzzer.mp3"></audio>
<audio id="nbaMusic" src="nba-music.mp3"></audio>

<script>
let home = 0;
let away = 0;
let time = 360;
let running = false;
let lastSide = "home";

/* DISPLAY */
function updateDisplay() {
    document.getElementById("homeScore").textContent = home;
    document.getElementById("awayScore").textContent = away;

    let min = Math.floor(time / 60);
    let sec = time % 60;

    let timerEl = document.getElementById("timer");
    timerEl.textContent = min + ":" + (sec < 10 ? "0" + sec : sec);

    if (time <= 10 && time > 0) {
        timerEl.classList.add("flash");
    } else {
        timerEl.classList.remove("flash");
    }
}

/* POPUP */
function showPopup(points, side) {
    const popup = document.createElement("div");
    popup.className = "popup";
    popup.textContent = "+" + points;

    popup.style.left = "180px";
    popup.style.top = side === "home" ? "120px" : "200px";

    document.getElementById("board").appendChild(popup);
    setTimeout(() => popup.remove(), 1000);
}

/* SOUND */
function playSounds(points) {
    const crowd = document.getElementById("crowdSound");
    const three = document.getElementById("threeSound");

    if (crowd) {
        crowd.volume = 0.3;
        crowd.currentTime = 0;
        crowd.play();
    }

    if (points === 3 && three) {
        three.volume = 1;
        three.currentTime = 0;
        three.play();
    }
}

/* MUSIC LOOP */
function musicLoop() {
    const music = document.getElementById("nbaMusic");
    if (!music) return;

    music.volume = 0.4;
    music.currentTime = 0;
    music.play();

    let next = Math.random() * 15000 + 15000;
    setTimeout(musicLoop, next);
}
musicLoop();

/* TIMER */
setInterval(() => {
    if (running) {
        if (time > 0) {
            time--;
        } else {
            running = false;
            document.getElementById("buzzerSound").play();

            let periodEl = document.getElementById("period");
            let current = Number(periodEl.textContent);

            if (current < 4) {
                periodEl.textContent = current + 1;
                time = 360;
            }
        }
    }
    updateDisplay();
}, 1000);

/* CONTROLS */
document.addEventListener("keydown", (e) => {

    if (e.code === "Space") {
        running = !running;
    }

    if (e.key >= "0" && e.key <= "9") {
        let points = Number(e.key);

        if (lastSide === "home") {
            home += points;
            showPopup(points, "home");
        } else {
            away += points;
            showPopup(points, "away");
        }

        playSounds(points);
        updateDisplay();
       showCameraFeed();
    }

    if (e.code === "ArrowLeft") lastSide = "home";
    if (e.code === "ArrowRight") lastSide = "away";
});

updateDisplay();
</script>
<script>
</script>

<script>
function showCameraFeed() {
  const feed = document.getElementById("cameraFeed");

  // show it
  feed.style.display = "block";

  // hide after 3 seconds
  setTimeout(() => {
    feed.style.display = "none";
  }, 3000);
}
</script>

<!-- 🔥 ADD THIS WHOLE BLOCK BELOW -->
<img id="overlayImage" src="" style="
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  max-width: 80%;
  display: none;
  z-index: 999;
">

<script>
let imageVisible = false;
let imageURL = "";

// 🔗 PUT YOUR GOOGLE SHEET CSV LINK HERE
const sheetURL = const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRcFH0v30-lrDT1f5u1ShSyRfd-ZJiUpzgZIO-nyI2V9z118fzjIBlXTau482ZPSK2Jff6qAl7aGzf_/pub?output=csv";

async function fetchImage() {
  try {
    const res = await fetch(sheetURL);
    const text = await res.text();

    const rows = text.split("\n");
    const cells = rows[1].split(",");

    imageURL = cells[0]; // A2
    document.getElementById("overlayImage").src = imageURL;

  } catch (err) {
    console.log("Sheet error:", err);
  }
}

// run once
fetchImage();
setInterval(fetchImage, 2000); // updates every 2 seconds

// press "i" to toggle image
document.addEventListener("keydown", (e) => {
  if (e.key.toLowerCase() === "i") {
    const img = document.getElementById("overlayImage");

    imageVisible = !imageVisible;
    img.style.display = imageVisible ? "block" : "none";
  }
});
</script>

</body>
</html>
