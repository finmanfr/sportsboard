<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scoreboard</title>

<style>
body {
    margin: 0;
    background: #1a1a1a;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* CIRCULAR BOARD */
.board {
    width: 420px;
    height: 420px;
    background: radial-gradient(circle, #2b2b2b 60%, #1a1a1a);
    border-radius: 50%;
    box-shadow: 0 0 30px black;
    padding: 20px;
    position: relative;
}

/* TEXT */
.top {
    display: flex;
    justify-content: space-between;
    color: white;
    font-weight: bold;
    margin-bottom: 10px;
}

.timer {
    font-family: 'scoreboard';
    font-size: 40px;
    color: red;
    text-align: center;
    margin-bottom: 10px;
}

.middle {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.score {
    font-family: 'scoreboard';
    font-size: 70px;
    color: red;
    text-align: center;
    width: 120px;
}

.center {
    text-align: center;
    color: white;
}

.period {
    font-family: 'scoreboard';
    font-size: 30px;
    color: red;
}

/* POPUP ANIMATION */
.popup {
    position: absolute;
    font-family: 'scoreboard';
    color: lime;
    font-size: 20px;
    opacity: 1;
    transform: scale(1);
    animation: pop 1s forwards;
}

@keyframes pop {
    0% { transform: scale(1); opacity: 1; }
    100% { transform: scale(2.5); opacity: 0; }
}

@font-face {
    font-family: 'scoreboard';
    src: url('scoreboard.ttf');
}
</style>
</head>

<body>

<div class="board" id="board">
    <div class="top">
        <div>HOME</div>
        <div>GUEST</div>
    </div>

    <div class="timer" id="timer">6:00</div>

    <div class="middle">
        <div class="score" id="homeScore">0</div>

        <div class="center">
            PERIOD
            <div class="period" id="period">1</div>
        </div>

        <div class="score" id="awayScore">0</div>
    </div>
</div>

<!-- AUDIO -->
<audio id="threeSound" src="three.mp3"></audio>
<audio id="crowdSound" src="crowd.mp3"></audio>

<script>
let home = 0;
let away = 0;
let time = 360;
let running = false;
let lastArrow = null;

function updateDisplay() {
    document.getElementById("homeScore").textContent = home;
    document.getElementById("awayScore").textContent = away;

    let min = Math.floor(time / 60);
    let sec = time % 60;
    document.getElementById("timer").textContent =
        min + ":" + (sec < 10 ? "0" + sec : sec);
}

/* POPUP EFFECT */
function showPopup(text, side) {
    const popup = document.createElement("div");
    popup.className = "popup";
    popup.textContent = "+" + text;

    popup.style.left = side === "home" ? "60px" : "280px";
    popup.style.top = "200px";

    document.getElementById("board").appendChild(popup);

    setTimeout(() => popup.remove(), 1000);
}

/* SOUND */
function playSounds(points) {
    const crowd = document.getElementById("crowdSound");
    const three = document.getElementById("threeSound");

    if (crowd) crowd.play();

    if (points === 3 && three) {
        three.play();
    }
}

/* TIMER */
setInterval(() => {
    if (running) {
        if (time > 0) {
            time--;
        }
        updateDisplay();
    }
}, 1000);

/* CONTROLS */
document.addEventListener("keydown", (e) => {

    if (e.code === "Space") {
        running = !running;
    }

    if (e.key >= "0" && e.key <= "9") {
        let points = Number(e.key);

        if (lastArrow === "left") {
            home += points;
            showPopup(points, "home");
            playSounds(points);
        }

        if (lastArrow === "right") {
            away += points;
            showPopup(points, "away");
            playSounds(points);
        }

        updateDisplay();
    }

    if (e.code === "ArrowLeft") lastArrow = "left";
    if (e.code === "ArrowRight") lastArrow = "right";
});

updateDisplay();
</script>

</body>
</html>
