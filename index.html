<!DOCTYPE html>
<html>
<head>
  <title>Scoreboard</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="scoreboard">
    <div class="team">
      <h1>HOME</h1>
      <div id="scoreA" class="score">0</div>
      <div>Fouls: <span id="foulsA">0</span></div>
    </div>

    <div class="center">
      <div id="timer" class="timer">6:00</div>
      <div>Quarter: <span id="quarter">1</span></div>
    </div>

    <div class="team">
      <h1>GUEST</h1>
      <div id="scoreB" class="score">0</div>
      <div>Fouls: <span id="foulsB">0</span></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
